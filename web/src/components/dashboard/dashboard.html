<div class="dashboard">
  <nav class="sidebar">
    <div class="sidebar-header">az code lab</div>
    <div class="ui-menu borderless sidebar-menu">
      <a class="ui-menu-item" lw-class:active="page === 'profile'" lw-on:click="navigate('profile')" href="#profile">
        <i class="ui-icon ui-icon-user"></i>
        <span>Profile</span>
      </a>
      <a class="ui-menu-item" lw-class:active="page === 'passkeys'" lw-on:click="navigate('passkeys')" href="#passkeys">
        <i class="ui-icon ui-icon-passkey"></i>
        <span>Passkeys</span>
      </a>
    </div>
    <div class="ui-menu borderless">
      <hr class="ui-menu-divider">
      <div class="ui-menu-item" disabled><span lw>email</span></div>
      <a class="ui-menu-item danger" lw-on:click="logout()">
        <i class="ui-icon ui-icon-log-out"></i>
        <span>Logout</span>
      </a>
    </div>
    <div class="resize-handle" lw-on:mousedown="onResizeStart($event)"></div>
  </nav>

  <main class="content">
    <!-- Profile -->
    <div lw-if="page === 'profile'" class="ui-panel flat">
      <div class="ui-panel-header">
        <h3 class="ui-panel-title">Profile</h3>
      </div>
      <div class="ui-panel-body">
        <div class="ui-stack sm">
          <div class="ui-field">
            <label class="ui-label">Email</label>
            <input class="ui-input" type="email" lw-model="email" disabled>
          </div>
          <div class="ui-field">
            <label class="ui-label">Name</label>
            <input class="ui-input" type="text" placeholder="Name" lw-model="userName">
          </div>
          <div class="ui-field">
            <label class="ui-label">Display Name</label>
            <input class="ui-input" type="text" placeholder="Display Name" lw-model="userDisplayName">
          </div>
        </div>
      </div>
      <div class="ui-panel-footer">
        <button class="ui-btn sm" lw-class:loading="profileLoading" lw-on:click="saveProfile()">Save</button>
      </div>
    </div>

    <!-- Passkeys -->
    <div lw-if="page === 'passkeys'" class="ui-panel flat">
      <div class="ui-panel-header">
        <h3 class="ui-panel-title">Passkeys</h3>
        <div class="ui-panel-actions">
          <button class="ui-btn sm" lw-class:loading="registerLoading" lw-on:click="registerPasskey()">Add Passkey</button>
        </div>
      </div>
      <div lw-if="credentialsLoaded && credentials.length === 0" class="ui-panel-body">
        <div class="ui-empty sm">
          <div class="ui-empty-icon"><i class="ui-icon ui-icon-passkey"></i></div>
          <p class="ui-empty-description">No passkeys registered.</p>
          <div class="ui-empty-actions">
            <button class="ui-btn sm" lw-class:loading="registerLoading" lw-on:click="registerPasskey()">Add Passkey</button>
          </div>
        </div>
      </div>
      <table lw-if="credentials.length > 0" class="ui-table borderless">
        <thead>
          <tr>
            <th>Authenticator</th>
            <th>Label</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr lw-for="cred in credentials">
            <td>
              <div class="authenticator-cell">
                <img lw-if="aaguidIcon(cred.aaguid)" lw-bind:src="aaguidIcon(cred.aaguid)" class="aaguid-icon">
                <span lw>aaguidName(cred.aaguid)</span>
              </div>
            </td>
            <td lw>parseUserAgent(cred.label)</td>
            <td lw>cred.created</td>
            <td class="action-cell"><button class="ui-btn outline danger sm" lw-on:click="deleteCredential(cred.id)">Delete</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div class="ui-toast-container top-center"></div>

<!-- Confirmation dialog -->
<dialog class="ui-dialog sm confirm-dialog">
  <div class="ui-dialog-header">
    <h3 lw class="ui-dialog-title">confirmTitle</h3>
  </div>
  <div lw class="ui-dialog-body">confirmMessage</div>
  <div class="ui-dialog-footer">
    <button class="ui-btn outline sm" lw-on:click="onConfirm(false)">Cancel</button>
    <button lw class="ui-btn sm" lw-class:danger="confirmDanger" lw-on:click="onConfirm(true)">confirmAction</button>
  </div>
</dialog>
